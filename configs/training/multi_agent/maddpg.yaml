---
algorithm:
    name: MADDPG
    batch_size: 64
    lr_actor: 0.0001
    lr_critic: 0.001
    learn_step: 16
    gamma: 0.95
    tau: 0.001
    O_U_noise: true
    expl_noise: 0.1
    mean_noise: 0.0
    theta: 0.15
    dt: 0.01

environment:
    name: pettingzoo.mpe.simple_speaker_listener_v4
    num_envs: 16
mutation:
    probabilities:
        no_mut: 0.4
        arch_mut: 0.4
        new_layer: 0.2
        params_mut: 0.0
        act_mut: 0.0
        rl_hp_mut: 0.35
    rl_hp_selection:
        lr_actor:
            min: 0.0001
            max: 0.01
        lr_critic:
            min: 0.0001
            max: 0.01
        batch_size:
            min: 8
            max: 2048
        learn_step:
            min: 20
            max: 200
    mutation_sd: 0.1
    rand_seed: 42

network:
    latent_dim: 64
    min_latent_dim: 8
    max_latent_dim: 1024
    arch: mlp

    encoder_config:
        hidden_size:
            - 64
        min_mlp_nodes: 64
        max_mlp_nodes: 500

    head_config:
        hidden_size:
            - 64
            - 64
        activation: ReLU
        min_hidden_layers: 1
        max_hidden_layers: 2
        min_mlp_nodes: 64
        max_mlp_nodes: 500

replay_buffer:
    max_size: 100_000

tournament_selection:
    tournament_size: 2
    elitism: true

training:
    max_steps: 2_000_000
    target_score:
    pop_size: 4
    evo_steps: 10_000
    eval_steps:
    eval_loop: 1
    learning_delay: 0
