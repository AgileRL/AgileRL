---
algorithm:
    name: IPPO
    batch_size: 256
    lr: 0.0001
    learn_step: 2048
    gamma: 0.99
    gae_lambda: 0.95
    action_std_init: 0.0
    clip_coef: 0.2
    ent_coef: 0.05
    vf_coef: 0.5
    max_grad_norm: 0.5
    target_kl:
    update_epochs: 4

environment:
    name: pettingzoo.butterfly.cooperative_pong_v5
    num_envs: 16
mutation:
    probabilities:
        no_mut: 0.4
        arch_mut: 0.2
        new_layer: 0.2
        params_mut: 0.2
        act_mut: 0.2
        rl_hp_mut: 0.35
    rl_hp_selection:
        lr:
            min: 0.000001
            max: 0.01
        batch_size:
            min: 8
            max: 1024
        learn_step:
            min: 256
            max: 8192
        ent_coef:
            min: 0.001
            max: 0.1
    mutation_sd: 0.1
    rand_seed: 42

network:
    latent_dim: 128
    arch: cnn
    encoder_config:
        channel_size:
            - 64
            - 64
            - 32
        kernel_size:
            - 8
            - 6
            - 4
        stride_size:
            - 4
            - 2
            - 2
        activation: ReLU

    head_config:
        hidden_size:
            - 128
        activation: ReLU

tournament_selection:
    tournament_size: 2
    elitism: true

training:
    max_steps: 2_000_000
    target_score:
    pop_size: 1
    evo_steps: 10_000
    eval_steps:
    eval_loop: 1
