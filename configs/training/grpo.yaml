---
algorithm:
    name: GRPO
    batch_size: 6
    beta: 0.001
    lr: 0.000005
    clip_coef: 0.2
    max_grad_norm: 0.1
    update_epochs: 1
    group_size: 2
    temperature: 0.9
    use_vllm: false
    vllm_config:
        tensor_parallel_size: 1
        gpu_memory_utilization: 0.3
        max_num_seqs: 8
        sleep_mode: false
    calc_position_embeddings: true
    reduce_memory_peak: false

environment:
    env_type: reasoning
    dataset: Jiayi-Pan/Countdown-Tasks-3to4
    columns:
        nums: question
        target: answer
    reward_file_path: reward.py
    reward_fn_name: combined_rewards
    prompt_template:
        system_0: You are a helpful assistant. You first think about the reasoning process in your mind and then provide the user with the answer.
        user_1: Using each number in this list only once {question}, create an equation that equals {answer}. You can use basic arithmetic operations (+,
            -, *, /) and each number can only be used once. Show your work in <redacted_thinking> </redacted_thinking> tags. And return the final equation
            and answer in <answer> </answer> tags, for example <answer>(1 + 2) / 3</answer>.
        assistant_2: "Let me solve this step by step.\n<redacted_thinking>"
    max_reward: 2.0
    train_test_split: 0.8

training:
    max_steps: 100000
    evo_steps: 5
    pop_size: 2
    eval_loop: 1
    evaluation_interval: 5

mutation:
    mutation_sd: 0.1
    rand_seed: 42
    probabilities:
        no_mut: 0.1
        arch_mut: 0.0
        new_layer: 0.0
        params_mut: 0.0
        act_mut: 0.0
        rl_hp_mut: 0.6
    rl_hp_selection:
        lr:
            min: 0.0000001
            max: 0.00001
        beta:
            min: 0.0001
            max: 0.01

tournament_selection:
    tournament_size: 2
    elitism: true

network:
    pretrained_model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
    max_context_length: 512
    lora_config:
        lora_r: 16
        lora_alpha: 64
        target_modules:
            - q_proj
            - k_proj
            - v_proj
            - o_proj
        lora_dropout: 0.05
        task_type: CAUSAL_LM
