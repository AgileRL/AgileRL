---
algorithm:
    name: DQN
    batch_size: 64
    lr: 0.001
    learn_step: 1
    gamma: 0.99
    tau: 0.001
    double: false
    cudagraphs: false

environment:
    name: stocks-v0
    num_envs: 16
mutation:
    probabilities:
        no_mut: 0.4
        arch_mut: 0.2
        new_layer: 0.2
        params_mut: 0.2
        act_mut: 0.0
        rl_hp_mut: 0.2
    rl_hp_selection:
        lr:
            min: 0.0001
            max: 0.01
        batch_size:
            min: 8
            max: 512
        learn_step:
            min: 1
            max: 16
    mutation_sd: 0.1
    rand_seed: 42

network:
    latent_dim: 64
    arch: lstm

    encoder_config:
        hidden_state_size: 64
        num_layers: 1

    head_config:
        hidden_size:
            - 64
        activation: ReLU
        min_hidden_layers: 1
        max_hidden_layers: 3
        min_mlp_nodes: 64
        max_mlp_nodes: 500

replay_buffer:
    max_size: 100_000

tournament_selection:
    tournament_size: 2
    elitism: true

training:
    max_steps: 1_000_000
    target_score: 200.0
    pop_size: 4
    evo_steps: 10_000
    eval_steps:
    eval_loop: 1
    learning_delay: 1000
