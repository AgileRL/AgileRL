---
algorithm:
    name: PPO
    batch_size: 128
    lr: 0.001
    learn_step: 6480
    gamma: 0.99
    gae_lambda: 0.95
    action_std_init: 0.6
    clip_coef: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    target_kl:
    update_epochs: 4
    share_encoders: true

environment:
    name: Blackjack-v1
    num_envs: 6
mutation:
    probabilities:
        no_mut: 0.4
        arch_mut: 0.2
        new_layer: 0.2
        params_mut: 0.2
        act_mut: 0.2
        rl_hp_mut: 0.2
    rl_hp_selection:
        lr:
            min: 0.0001
            max: 0.01
        batch_size:
            min: 8
            max: 1024
        learn_step:
            min: 256
            max: 8192
    mutation_sd: 0.1
    rand_seed: 42

network:
    latent_dim: 64
    arch: multiinput

    encoder_config:
        latent_dim: 64                # Per-input encoder output dimension
        mlp_config:
            hidden_size:
                - 64
            activation: Tanh
            min_mlp_nodes: 64
            max_mlp_nodes: 500

    head_config:
        hidden_size:
            - 8
        activation: Tanh
        min_hidden_layers: 1
        max_hidden_layers: 3
        min_mlp_nodes: 8
        max_mlp_nodes: 500

tournament_selection:
    tournament_size: 2
    elitism: true

training:
    max_steps: 2_000_000
    target_score: 190.0
    pop_size: 4
    evo_steps: 12_960
    eval_steps:
    eval_loop: 1
