---
MUTATION_PARAMS:
    NO_MUT: 0.1                           # Probability of no mutation
    RL_HP_MUT: 0.6                        # Probability of learning HP mutation
    MUT_SD: 0.1                           # Mutation strength (std dev)
    RAND_SEED: 42                         # Random seed
    MIN_LR: 1.0e-7                        # Min learning rate for HP mutation
    MAX_LR: 1.0e-5                        # Max learning rate for HP mutation
    MIN_BETA: 1.0e-4                      # Min KL penalty beta for HP mutation
    MAX_BETA: 1.0e-2                      # Max KL penalty beta for HP mutation
    MIN_GROUP_SIZE: 4                     # Min group size for HP mutation
    MAX_GROUP_SIZE: 12                    # Max group size for HP mutation


INIT_HP:
    ALGO: GRPO                            # Algorithm — group relative policy optimization
    BATCH_SIZE: 4                        # Batch size (number of prompts per step)
    BETA: 1.0e-3                          # KL divergence penalty coefficient
    LR: 5.0e-6                            # Learning rate
    CLIP_COEF: 0.2                        # Surrogate clipping coefficient (PPO-style)
    MAX_GRAD_NORM: 0.1                    # Maximum norm for gradient clipping
    UPDATE_EPOCHS: 1                      # Number of training epochs per learn() call
    GROUP_SIZE: 16                         # Number of completions sampled per prompt
    TEMPERATURE: 0.9                      # Sampling temperature for generation
    MAX_MODEL_LEN: 1024                   # Maximum context length for the model
    COSINE_lR_SCHEDULER:                  # Cosine LR scheduler config (null = disabled)
    TOURN_SIZE: 2                         # Tournament size for evolutionary selection
    ELITISM: true                         # Elitism in tournament selection
    POP_SIZE: 1                           # Population size
    EVAL_LOOP: 1                          # Evaluation episodes
    LORA:                                  # LoRA adapter configuration (passed to peft.LoraConfig)
        r: 16                              # LoRA rank
        lora_alpha: 64                     # LoRA scaling factor
        target_modules:                    # Linear layers to apply LoRA to
            - q_proj
            - k_proj
            - v_proj
            - o_proj
        lora_dropout: 0.05                # Dropout probability for LoRA layers
        bias: none                         # Bias training strategy ("none", "all", or "lora_only")
