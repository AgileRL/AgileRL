---
MUTATION_PARAMS:
    NO_MUT: 0.1
    RL_HP_MUT: 0.6
    MUT_SD: 0.1
    RAND_SEED: 42
    MIN_LR: 0.0000001
    MAX_LR: 0.00001
    MIN_BETA: 0.0001
    MAX_BETA: 0.01
    MIN_GROUP_SIZE: 4
    MAX_GROUP_SIZE: 12


INIT_HP:
    ALGO: LLMPPO
    BATCH_SIZE: 16
    BETA: 0.01                # KL penalty — keeps policy close to reference
    LR_ACTOR: 0.000005        # 5e-6 — good for LoRA on 0.5B instruct model
    LR_CRITIC: 0.00001        # 1e-5 — value head learns faster
    CLIP_COEF: 0.2
    MAX_GRAD_NORM: 1.0
    UPDATE_EPOCHS: 2
    TEMPERATURE: 0.9          # Higher temp for better exploration in sparse reward setting
    MAX_MODEL_LEN: 2048
    TOURN_SIZE: 2
    GAMMA: 0.99               # Higher discount for multi-turn credit assignment
    VF_COEF: 0.5              # Stronger value loss to train critic faster
    GAE_LAMBDA: 0.95
    ELITISM: true
    POP_SIZE: 4
    EVAL_LOOP: 1
