---
INIT_HP:
    ALGO: DPO
    BATCH_SIZE: 16
    BETA: 0.001
    UPDATE_EPOCHS: 1
    MAX_GRAD_NORM: 0.1
    REDUCE_MEMORY_PEAK: false
    CALC_POSITION_EMBEDDINGS: true
    USE_SEPARATE_REFERENCE_ADAPTER: true
    SEED: 42
    TOURN_SIZE: 2
    ELITISM: true
    POP_SIZE: 4
    EVAL_LOOP: 1
    EVO_STEPS: null             # null disables HPO evolution
    EVALUATION_INTERVAL: 200    # evaluate every N batches
    NUM_BATCHES: null           # null trains a full epoch; set to an integer to cap batches
    WANDB: false
    WANDB_API_KEY: null         # or set via WANDB_API_KEY env var
    WANDB_PROJECT: AgileRL
    WANDB_ENTITY: null          # your W&B username or team; null uses your default entity
    WANDB_RUN_NAME: null        # null auto-generates "{dataset}-EvoHPO-{algo}-{timestamp}"

MUTATION_PARAMS:
    NO_MUT: 0.1                          # No mutation
    RL_HP_MUT: 0.6                       # Learning HP mutation
    MUT_SD: 0.1                          # Mutation strength
    RAND_SEED: 42                        # Random seed
    MIN_LR: 0.0000001
    MAX_LR: 0.00001
    MIN_BETA: 0.0001
    MAX_BETA: 0.01
    MIN_GROUP_SIZE: 4
    MAX_GROUP_SIZE: 12
