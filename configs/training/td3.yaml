---
algorithm:
    name: TD3
    batch_size: 128
    lr_actor: 0.0001
    lr_critic: 0.001
    learn_step: 1
    gamma: 0.99
    tau: 0.005
    policy_freq: 2
    O_U_noise: true
    expl_noise: 0.1
    mean_noise: 0.0
    theta: 0.15
    dt: 0.01
    share_encoders: true

environment:
    name: LunarLanderContinuous-v3
    num_envs: 16
mutation:
    mutation_sd: 0.1
    rand_seed: 42
    probabilities:
        no_mut: 0.4
        arch_mut: 0.2
        new_layer: 0.2
        params_mut: 0.2
        act_mut: 0.0
        rl_hp_mut: 0.2
    rl_hp_selection:
        lr_actor:
            min: 0.0001
            max: 0.01
        lr_critic:
            min: 0.0001
            max: 0.01
        batch_size:
            min: 8
            max: 512
        learn_step:
            min: 1
            max: 16

network:
    latent_dim: 64
    arch: mlp

    encoder_config:
        hidden_size:
            - 64
        min_mlp_nodes: 64
        max_mlp_nodes: 500

    head_config:
        hidden_size:
            - 64
        min_hidden_layers: 1
        max_hidden_layers: 2
        min_mlp_nodes: 64
        max_mlp_nodes: 500

replay_buffer:
    max_size: 100_000

tournament_selection:
    tournament_size: 2
    elitism: true

training:
    max_steps: 1_000_000
    target_score: 200.0
    pop_size: 4
    evo_steps: 10_000
    eval_steps:
    eval_loop: 1
    learning_delay: 1000
