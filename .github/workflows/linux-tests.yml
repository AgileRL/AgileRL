---
name: Linux

on:
    push:
        branches: [main, nightly]
        paths:
            - agilerl/**
            - tests/**
            - .github/workflows/**
            - pyproject.toml
    pull_request:
        paths:
            - agilerl/**
            - tests/**
            - .github/workflows/**
            - pyproject.toml

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    tests:
        runs-on: gha-runner-scale-set
        strategy:
            fail-fast: false
            max-parallel: 4
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13']

        container:
            image: pytorch/pytorch:2.7.1-cuda12.6-cudnn9-devel
            options: --user root

        # Workspace (/__w) is ~1GB with little free space; root (/) has plenty. Put cache and venv on /.
        env:
            UV_CACHE_DIR: /tmp/uv-cache
            UV_PROJECT_ENVIRONMENT: /tmp/agilerl-venv
            HF_HOME: /tmp/hf-cache
            TORCHINDUCTOR_CACHE_DIR: /tmp/inductor-cache

        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}

            - name: Cache HuggingFace models
              uses: actions/cache@v4
              with:
                  path: /tmp/hf-cache
                  key: hf-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: hf-${{ matrix.python-version }}-

            - name: Cache torch inductor compilations
              uses: actions/cache@v4
              with:
                  path: /tmp/inductor-cache
                  key: inductor-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: inductor-${{ matrix.python-version }}-

            - name: Install dependencies
              # swig is needed to build box2d-py from source (no pre-built wheels for py3.10+).
              run: |
                  uv sync --locked --all-groups --extra all
                  echo "$UV_PROJECT_ENVIRONMENT/bin" >> $GITHUB_PATH

            - name: Reset coverage data
              run: rm -f .coverage .coverage.*

            # Non-vLLM phase: inherits `-n auto --dist loadgroup` from pyproject.
            # `gpu`-marked tests fan out across the 3 `gpu0..gpu2` xdist groups;
            # CPU tests use the remaining workers.
            - name: Run non-vLLM tests (parallel)
              run: uv run pytest -m "not vllm" --exitfirst --cov=agilerl --cov-report= --durations=0 --durations-min=1.0

            # vLLM phase: parallel across 3 vllm0..vllm2 xdist groups. vLLM tests
            # set `kv_cache_memory_bytes` on `VLLMConfig`, which takes vLLM's
            # early-return path in `determine_available_memory` and skips the
            # startup memory-profiling assertion that fires when peer processes
            # free GPU memory mid-init. Run only on the newest Python version —
            # vLLM behavior doesn't depend on the Python interpreter, so re-running
            # the same vLLM tests on every matrix version just multiplies wall time
            # and GPU contention.
            - name: Run vLLM tests (parallel, single Python version)
              if: matrix.python-version == '3.13'
              run: uv run pytest -n 3 -m "vllm" --exitfirst --cov=agilerl --cov-append --cov-report= --durations=0 --durations-min=1.0

            - name: Combine coverage data
              run: |
                  if ls .coverage.* >/dev/null 2>&1; then
                      uv run coverage combine
                  else
                      echo "No parallel coverage shards found; skipping combine."
                  fi

            - name: Generate coverage report
              run: uv run coverage xml -o coverage.xml

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v3
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
