---
name: Linux

on:
    push:
        branches: [main, nightly]
        paths:
            - agilerl/**
            - tests/**
            - .github/workflows/**
            - pyproject.toml
    pull_request:
        paths:
            - agilerl/**
            - tests/**
            - .github/workflows/**
            - pyproject.toml

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    tests:
        runs-on: gha-runner-scale-set
        strategy:
            fail-fast: false
            max-parallel: 4
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13']

        container:
            image: pytorch/pytorch:2.7.1-cuda12.6-cudnn9-devel
            options: --user root

        # Workspace (/__w) is ~1GB with little free space; root (/) has plenty. Put cache and venv on /.
        env:
            UV_CACHE_DIR: /tmp/uv-cache
            UV_PROJECT_ENVIRONMENT: /tmp/agilerl-venv
            HF_HOME: /tmp/hf-cache
            TORCHINDUCTOR_CACHE_DIR: /tmp/inductor-cache

        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}

            - name: Cache HuggingFace models
              uses: actions/cache@v4
              with:
                  path: /tmp/hf-cache
                  key: hf-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: hf-${{ matrix.python-version }}-

            - name: Cache torch inductor compilations
              uses: actions/cache@v4
              with:
                  path: /tmp/inductor-cache
                  key: inductor-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: inductor-${{ matrix.python-version }}-

            - name: Install dependencies
              # swig is needed to build box2d-py from source (no pre-built wheels for py3.10+).
              run: |
                  uv sync --locked --all-groups --extra all
                  echo "$UV_PROJECT_ENVIRONMENT/bin" >> $GITHUB_PATH

            - name: Reset coverage data
              run: rm -f .coverage .coverage.*

            # Non-vLLM phase: inherits `-n auto --dist loadgroup` from pyproject.
            # `gpu`-marked tests fan out across the 3 `gpu0..gpu2` xdist groups;
            # CPU tests use the remaining workers.
            - name: Run non-vLLM tests (parallel)
              run: uv run pytest -m "not vllm" --exitfirst --cov=agilerl --cov-report= --durations=0 --durations-min=1.0

            # vLLM phase: parallel across the vllm0..vllm15 xdist groups defined
            # in tests/conftest.py. vLLM tests set `kv_cache_memory_bytes` on
            # `VLLMConfig`, which takes vLLM's early-return path in
            # `determine_available_memory` and skips the startup memory-profiling
            # assertion that fires when peer processes free GPU memory mid-init.
            #
            # Concurrency: explicit `-n 4` cap (overrides pyproject's `-n auto`).
            # Two reasons:
            # 1. GPU memory: measured peaks are ~4.4 GiB
            #    (test_grpo_move_model_to_vllm), ~3.0 GiB (test_grpo_learn),
            #    ~2.5 GiB (test_grpo_clone_with_accelerator_vllm); median ~1.5
            #    GiB. With a 14.58 GiB per-container GPU, 4 × median ≈ 6 GiB
            #    fits comfortably; 4 × peak ≈ 17.6 GiB would OOM if the
            #    heaviest tests align across all four workers (rare). Drop to
            #    `-n 3` (worst-case ceiling = floor(14.58/4.4) ≈ 3) if the
            #    OOM rate becomes a problem.
            # 2. Port races: each worker's `deepspeed_env` fixture allocates a
            #    free MASTER_PORT via a bind-to-port-0 / close / return dance
            #    (TOCTOU). The collision rate is acceptable at 4 workers; if
            #    it starts surfacing `EADDRINUSE` failures during
            #    `torch.distributed.init_process_group`, drop to `-n 3` or
            #    switch `get_free_port` to a deterministic per-worker range.
            - name: Run vLLM tests (parallel across xdist groups)
              run: uv run pytest -n 4 -m "vllm" --exitfirst --cov=agilerl --cov-append --cov-report= --durations=0 --durations-min=1.0

            - name: Combine coverage data
              run: |
                  if ls .coverage.* >/dev/null 2>&1; then
                      uv run coverage combine
                  else
                      echo "No parallel coverage shards found; skipping combine."
                  fi

            - name: Generate coverage report
              run: uv run coverage xml -o coverage.xml

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v3
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
