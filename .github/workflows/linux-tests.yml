---
name: Linux

on:
    push:
        branches: [main, nightly]
        paths:
            - agilerl/**
            - tests/**
            - .github/workflows/**
            - pyproject.toml
    pull_request:
        paths:
            - agilerl/**
            - tests/**
            - .github/workflows/**
            - pyproject.toml

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    tests:
        runs-on: gha-runner-scale-set
        strategy:
            fail-fast: false
            max-parallel: 4
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13']

        container:
            image: pytorch/pytorch:2.7.1-cuda12.6-cudnn9-devel
            options: --user root

        # Workspace (/__w) is ~1GB with little free space; root (/) has plenty. Put cache and venv on /.
        env:
            UV_CACHE_DIR: /tmp/uv-cache
            UV_PROJECT_ENVIRONMENT: /tmp/agilerl-venv
            HF_HOME: /tmp/hf-cache
            TORCHINDUCTOR_CACHE_DIR: /tmp/inductor-cache

        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}

            - name: Cache HuggingFace models
              uses: actions/cache@v4
              with:
                  path: /tmp/hf-cache
                  key: hf-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: hf-${{ matrix.python-version }}-

            - name: Cache torch inductor compilations
              uses: actions/cache@v4
              with:
                  path: /tmp/inductor-cache
                  key: inductor-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: inductor-${{ matrix.python-version }}-

            - name: Install dependencies
              # swig is needed to build box2d-py from source (no pre-built wheels for py3.10+).
              run: |
                  uv sync --locked --all-groups --extra all
                  echo "$UV_PROJECT_ENVIRONMENT/bin" >> $GITHUB_PATH

            - name: Reset coverage data
              run: rm -f .coverage .coverage.*

            # Non-vLLM phase: inherits `-n auto --dist loadgroup` from pyproject.
            # `gpu`-marked tests fan out across the 3 `gpu0..gpu2` xdist groups;
            # CPU tests use the remaining workers.
            - name: Run non-vLLM tests (parallel)
              run: uv run pytest -m "not vllm" --exitfirst --cov=agilerl --cov-report= --durations=0 --durations-min=1.0

            # vLLM phase: parallel across the vllm0..vllm{N-1} xdist groups
            # defined in tests/conftest.py. vLLM tests set `kv_cache_memory_bytes`
            # on `VLLMConfig`, which takes vLLM's early-return path in
            # `determine_available_memory` and skips the startup memory-profiling
            # assertion that fires when peer processes free GPU memory mid-init.
            #
            # Concurrency: inherits `-n auto` from pyproject.toml's addopts, so
            # the worker count is decided by the runner's CPU count (each matrix
            # container has its own dedicated 16 GiB GPU — no sibling-container
            # GPU contention). The xdist group count in tests/conftest.py is
            # sized large enough to absorb whatever `-n auto` returns on
            # current runners. If a runner happens to have many cores and
            # `-n auto` saturates the groups, in the worst case all heavy tests
            # could align across workers — measured peaks are ~4.4 GiB
            # (test_grpo_move_model_to_vllm), ~3.0 GiB (test_grpo_learn),
            # ~2.5 GiB (test_grpo_clone_with_accelerator_vllm); median per-test
            # is ~1.5 GiB. If CI OOMs, cap concurrency by adding an explicit
            # `-n N` here (where N = floor(16 GiB / 4.4 GiB) ≈ 3 is the safe
            # worst-case ceiling).
            - name: Run vLLM tests (parallel across xdist groups)
              run: uv run pytest -m "vllm" --exitfirst --cov=agilerl --cov-append --cov-report= --durations=0 --durations-min=1.0

            - name: Combine coverage data
              run: |
                  if ls .coverage.* >/dev/null 2>&1; then
                      uv run coverage combine
                  else
                      echo "No parallel coverage shards found; skipping combine."
                  fi

            - name: Generate coverage report
              run: uv run coverage xml -o coverage.xml

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v3
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
