---
name: Linux

on:
    push:
        branches: [main, nightly]
        paths:
            - agilerl/**
            - tests/**
            - .github/workflows/**
            - pyproject.toml
    pull_request:
        branches: [main, nightly]
        paths:
            - agilerl/**
            - tests/**
            - .github/workflows/**
            - pyproject.toml

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    tests:
        runs-on: gha-runner-scale-set
        strategy:
            fail-fast: false
            max-parallel: 4
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13']

        container:
            image: pytorch/pytorch:2.7.1-cuda12.6-cudnn9-devel
            options: --user root

        # Workspace (/__w) is ~1GB with little free space; root (/) has plenty. Put cache and venv on /.
        env:
            UV_CACHE_DIR: /tmp/uv-cache
            UV_PROJECT_ENVIRONMENT: /tmp/agilerl-venv
            HF_HOME: /tmp/hf-cache
            TORCHINDUCTOR_CACHE_DIR: /tmp/inductor-cache

        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: ${{ matrix.python-version }}

            - name: Cache HuggingFace models
              uses: actions/cache@v4
              with:
                  path: /tmp/hf-cache
                  key: hf-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: hf-${{ matrix.python-version }}-

            - name: Cache torch inductor compilations
              uses: actions/cache@v4
              with:
                  path: /tmp/inductor-cache
                  key: inductor-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
                  restore-keys: inductor-${{ matrix.python-version }}-

            - name: Install dependencies
              # swig is needed to build box2d-py from source (no pre-built wheels for py3.10+).
              run: |
                  uv sync --locked --all-groups --extra all
                  echo "$UV_PROJECT_ENVIRONMENT/bin" >> $GITHUB_PATH

            - name: Run non-LLM tests (parallel)
              run: |
                  uv run pytest -m "not llm" --exitfirst --cov=agilerl --cov-append --cov-report= --durations=0 --durations-min=1.0

            - name: Run LLM tests (sequential, exclusive GPU)
              run: |
                  uv run pytest -n0 -m "llm" --exitfirst --cov=agilerl --cov-append --cov-report= --durations=0 --durations-min=1.0

            - name: Combine coverage and generate report
              run: |
                  uv run coverage combine
                  uv run coverage xml -o coverage.xml

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v3
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
