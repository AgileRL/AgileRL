---
algorithm:
    name: DDPG
    lr_actor: 0.0003
    lr_critic: 0.0003
    tau: 0.005

environment:
    name: LunarLanderContinuous-v3
    num_envs: 16

network:
    latent_dim: 64
    arch: simba
    encoder_config:
        hidden_size: 128
        num_blocks: 2
    head_config:
        hidden_size: [64]

replay_buffer:
    memory_size: 100000

training:
    max_steps: 1000
    evo_steps: 100
    pop_size: 2
