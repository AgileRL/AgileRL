---
algorithm:
    name: NeuralUCB
    lr: 0.001
    gamma: 1.0
    lamb: 1.0
    reg: 0.000625

environment:
    name: IRIS
    features: tests/data/iris_features.csv
    targets: tests/data/iris_targets.csv

network:
    latent_dim: 128
    arch: mlp
    encoder_config:
        hidden_size: [128]
    head_config:
        hidden_size: [128]

replay_buffer:
    memory_size: 10000

training:
    max_steps: 1000
    evo_steps: 100
    pop_size: 2
